# ==========================================================
# AI-Driven VPA Controller – Final Production-Grade values.yaml
# Enterprise-ready, HA-safe, schema-ready, multi-target hardened
# ==========================================================

# ==========================================================
# Image Configuration
#
# Image resolution precedence:
#   1. digest (highest priority, immutable)
#   2. tag
#   3. Chart.appVersion (fallback)
#
# For regulated environments:
#   - Prefer digest with pullPolicy: IfNotPresent
#   - Avoid :latest tags
# ==========================================================
image:
  registry: ""                   # Empty = Docker Hub. Override for private registry.
  repository: ai-vpa-controller
  tag: ""                        # Overrides Chart.appVersion if set.
  digest: ""                     # sha256:<hash> (overrides tag if set)
  pullPolicy: IfNotPresent       # Use Always only with mutable tags.
  pullSecrets: []                # e.g. ["regcred"]

# ==========================================================
# Controller Runtime
# ==========================================================
controller:
  replicaCount: 2

  # ----------------------------------------------------------
  # Deployment Strategy & Rollout Controls (Production Critical)
  # ----------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  terminationGracePeriodSeconds: 30

  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600

  dnsPolicy: ClusterFirst

  startupProbe:
    enabled: true
    path: /healthz
    periodSeconds: 10
    failureThreshold: 30
  
  # ADD THIS BLOCK: Standardizes port naming for your new templates
  ports:
    metrics: 8000
    health: 8080

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  priorityClassName: ""

  livenessProbe:
    enabled: true
    path: /healthz
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 5

  readinessProbe:
    enabled: true
    path: /readyz
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3


# ==========================================================
# Logging
# ==========================================================
logging:
  level: info                   # debug | info | warn | error
  format: json                  # json | console

# ==========================================================
# Feature Flags
# ==========================================================
features:
  dryRun: false                 # If true, recommendations are not applied
  reactiveFallback: true
  events: true

# ==========================================================
# Watch Scope (RBAC Blast Radius Control)
#
# Limiting namespaces reduces required RBAC scope.
# clusterScoped=false recommended for regulated clusters.
# ==========================================================
watch:
  namespaces: []                # Empty = all namespaces (cluster-wide)
  clusterScoped: false

# ==========================================================
# ML Engine Configuration
#
# Schema Guardrails (to enforce in values.schema.json):
#   polling.intervalSeconds >= 5
#   leaseDuration > renewDeadline > retryPeriod
# ==========================================================
mlEngine:
  polling:
    intervalSeconds: 15         # Must be >= 5
    cooldownSeconds: 600

  window:
    durationSeconds: 300
    featureCount: 20

  model:
    type: aggregate             # aggregate | predictive
    parameters: {}

  validation:
    minSamplesRequired: 30
    maxRecommendationChangePercent: 50
    rejectOnInsufficientData: true

# ==========================================================
# Metrics Backend (Prometheus-Compatible)
#
# metricsBackend.enabled is the single toggle.
# ==========================================================
metricsBackend:
  enabled: true

  service:
    enabled: true
    name: prometheus-server
    namespace: monitoring
    port: 9090

  externalUrl: ""               # If set, overrides service-based config

  tls:
    enabled: false
    caSecretName: ""
    insecureSkipVerify: false

  authentication:
    enabled: false
    bearerTokenSecretName: ""
    basicAuthSecretName: ""

  query:
    stepSeconds: 15
    timeoutSeconds: 10
    scrapeDelayBufferSeconds: 15

# ==========================================================
# Resource Governance
#
# Schema Guardrails:
#   absoluteMin < absoluteMax
#   limitsPolicy.minRatio > 0
#   limitsPolicy.maxRatio >= minRatio
# ==========================================================
governance:
  enforcementMode: enforce      # enforce | warn | disabled

  cpu:
    absoluteMin: 0.1
    absoluteMax: 2.0

  memory:
    absoluteMin: 256
    absoluteMax: 4096

  limitsPolicy:
    enabled: true
    strategy: proportional      # proportional | fixedRatio
    ratio: 1.3                  # Used when strategy=proportional

    # Ratio guardrails (schema-enforced)
    minRatio: 1.0
    maxRatio: 3.0

    clampBehavior: clamp        # clamp | reject | warn

    fixed:
      cpu: ""
      memory: ""

# ==========================================================
# Leader Election (HA Critical)
#
# Schema Guardrails:
#   leaseDurationSeconds > renewDeadlineSeconds > retryPeriodSeconds
# ==========================================================
leaderElection:
  enabled: true
  leaseName: ai-vpa-controller-lease
  leaseDurationSeconds: 30
  renewDeadlineSeconds: 20
  retryPeriodSeconds: 5

# ==========================================================
# Pod Disruption Budget
# Compatible with replicaCount > 1
# ==========================================================
pdb:
  enabled: true
  minAvailable: 1

# ==========================================================
# HA Scheduling Controls
# Prevent same-node replica co-location
# ==========================================================
scheduling:
  podAntiAffinity:
    enabled: true
    type: preferred

  topologySpread:
    enabled: true
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway


# ==========================================================
# Targets (STRICT SAFETY MODEL)
#
# REQUIRED per entry:
#   namespace
#   kind
#   container
#
# EXACTLY ONE OF:
#   name
#   selector
#
# Runtime MUST reject invalid configurations.
# Namespace-wide scaling via selector must use explicit labels.
# ==========================================================
targets:
  - namespace: default
    kind: StatefulSet
    container: nginx
    name: vpa-test-app
    selector: {}               # Must be empty if name is set

# ==========================================================
# Observability Exposure
# ==========================================================
metrics:
  enabled: true
  path: /metrics
  secureMode: false
  defaultToReleaseNamespace: true
  # REQUIRED for the NetworkPolicy logic you added
  allowedNamespaces: [] 

  service:
    type: ClusterIP
    annotations: {}

  serviceMonitor:
    enabled: false # Set to true only if Prometheus Operator is installed
    namespace: ""
    serviceNamespaceSelector:
      matchReleaseNamespace: true
      matchNames: []
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

# ==========================================================
# Health Exposure (Required for your new NetworkPolicy logic)
# ==========================================================
health:
  exposure: same-namespace # same-namespace | kube-system | custom
  allowedNamespaces: []


# ==========================================================
# RBAC & Service Account
# Scope should align with watch configuration.
# ==========================================================
rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

# ==========================================================
# Pod Security
# ==========================================================
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# ==========================================================
# Scheduling & Placement
# ==========================================================
nodeSelector: {}

tolerations: []

affinity: {}


# ==========================================================
# Network Isolation (Zero-Trust)
# ==========================================================
networkPolicy:
  enabled: true

# ==========================================================
# End of Production Configuration
# ==========================================================
